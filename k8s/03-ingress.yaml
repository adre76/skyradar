apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skyradar
  namespace: skyradar
  labels:
    app: skyradar
  annotations:
    # ── nginx-ingress ──────────────────────────────────────────────────────
    kubernetes.io/ingress.class: "nginx"

    # Redireciona /radar → /radar/ automaticamente
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    # Proxy buffers generosos para respostas JSON de aviões
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"

    # ── TLS automático via cert-manager (Let's Encrypt) ───────────────────
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  tls:
    - hosts:
        - andrepereira.tec.br
      secretName: skyradar-tls          # cert-manager cria este Secret

  rules:
    - host: andrepereira.tec.br
      http:
        paths:
          # Captura /radar e /radar/* e repassa para o serviço
          # O grupo ($2) é o sufixo depois de /radar → vai para /  
          - path: /radar(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: skyradar
                port:
                  number: 80
