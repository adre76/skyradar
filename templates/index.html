<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkyRadar — Aviões em Tempo Real</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --green:   #00ff88;
    --green2:  #00cc66;
    --amber:   #ffbb00;
    --red:     #ff4455;
    --blue:    #00aaff;
    --bg:      #050a0e;
    --panel:   #080f14;
    --border:  #0d2233;
    --text:    #c8e6ff;
    --dim:     #4a7090;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px var(--green));
  }

  .logo-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--green);
    text-shadow: 0 0 12px var(--green);
    letter-spacing: 3px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat-box {
    text-align: center;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 4px;
    background: rgba(0,255,136,0.04);
  }

  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  select, button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
  }

  button {
    background: rgba(0,255,136,0.08);
    border-color: var(--green2);
    color: var(--green);
    text-shadow: 0 0 6px var(--green);
    transition: all .2s;
  }

  button:hover {
    background: rgba(0,255,136,0.18);
    box-shadow: 0 0 12px rgba(0,255,136,0.3);
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    background: #030810;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #plane-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .plane-card {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(13,34,51,0.7);
    cursor: pointer;
    transition: background .15s;
  }

  .plane-card:hover {
    background: rgba(0,255,136,0.05);
  }

  .plane-card.active {
    background: rgba(0,255,136,0.1);
    border-left: 2px solid var(--green);
  }

  .plane-callsign {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--green);
    text-shadow: 0 0 6px rgba(0,255,136,0.5);
  }

  .plane-info {
    font-size: 11px;
    color: var(--dim);
    margin-top: 3px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .plane-info span { display: flex; align-items: center; gap: 3px; }

  /* ── Status bar ── */
  .statusbar {
    padding: 6px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #status-msg { color: var(--amber); }
  #status-msg.ok  { color: var(--green); }
  #status-msg.err { color: var(--red); }

  #clock {
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
  }

  /* ── Leaflet overrides ── */
  .leaflet-container { background: #030810 !important; }

  .leaflet-tile-pane { filter: brightness(.55) saturate(.4) hue-rotate(190deg); }

  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    border: 1px solid var(--green2) !important;
    border-radius: 6px !important;
    color: var(--text) !important;
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 12px !important;
    box-shadow: 0 0 20px rgba(0,255,136,0.2) !important;
  }

  .leaflet-popup-tip { background: var(--green2) !important; }

  /* ── Scanning ring ── */
  @keyframes scanRing {
    0%   { transform: scale(0); opacity:.6; }
    100% { transform: scale(1); opacity:0; }
  }

  .scan-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--green);
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: center;
    animation: scanRing 2s ease-out infinite;
    pointer-events: none;
    margin: -20px 0 0 -20px;
  }

  /* ── No data ── */
  .no-data {
    padding: 30px 16px;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── Loader ── */
  .loader {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--dim);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* scrollbar */
  #plane-list::-webkit-scrollbar { width: 4px; }
  #plane-list::-webkit-scrollbar-track { background: transparent; }
  #plane-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">✈</span>
    <div>
      <div class="logo-text">SKYRADAR</div>
      <div class="logo-sub">Aviões em Tempo Real</div>
    </div>
  </div>

  <div class="header-stats">
    <div class="stat-box">
      <div class="stat-value" id="count">—</div>
      <div class="stat-label">Aviões</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="radius-display">—</div>
      <div class="stat-label">Raio (km)</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="refresh-countdown">—</div>
      <div class="stat-label">Próx. update</div>
    </div>
  </div>

  <div class="header-controls">
    <select id="radius-select">
      <option value="75">75 km</option>
      <option value="150" selected>150 km</option>
      <option value="250">250 km</option>
      <option value="400">400 km</option>
    </select>
    <select id="interval-select">
      <option value="30">30s</option>
      <option value="60" selected>60s</option>
      <option value="120">2 min</option>
    </select>
    <button id="refresh-btn" onclick="manualRefresh()">⟳ Atualizar</button>
  </div>
</header>

<div class="main">
  <div id="map"></div>

  <aside class="sidebar">
    <div class="sidebar-header">📡 Tráfego detectado</div>
    <div id="plane-list"><div class="no-data">Aguardando localização…</div></div>
  </aside>
</div>

<div class="statusbar">
  <span id="status-msg">Obtendo localização…</span>
  <span id="clock"></span>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let map, myMarker, myCircle, planeLayer;
  let myLat = null, myLon = null;
  let planeMarkers = {};
  let selectedIcao = null;
  let refreshTimer = null;
  let countdownTimer = null;
  let countdownSec = 0;

  // ── Clock ──────────────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('pt-BR');
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Init Map ───────────────────────────────────────────────────────────────
  function initMap(lat, lon) {
    if (map) return;

    map = L.map('map', { zoomControl: true, attributionControl: false }).setView([lat, lon], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
    }).addTo(map);

    // Attribution minimal
    L.control.attribution({ prefix: false }).addTo(map);
    map.attributionControl.addAttribution('© OSM | OpenSky Network');

    planeLayer = L.layerGroup().addTo(map);
  }

  // ── My Location Marker ────────────────────────────────────────────────────
  function placeMyMarker(lat, lon) {
    const radius = parseInt(document.getElementById('radius-select').value);

    if (myMarker) { myMarker.remove(); myCircle.remove(); }

    const myIcon = L.divIcon({
      className: '',
      html: `<div style="position:relative;width:40px;height:40px;">
               <div style="width:14px;height:14px;background:#00ff88;border-radius:50%;
                           position:absolute;top:13px;left:13px;
                           box-shadow:0 0 12px #00ff88,0 0 24px #00ff88;"></div>
               <div class="scan-ring"></div>
               <div class="scan-ring" style="animation-delay:.7s;"></div>
             </div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 20],
    });

    myMarker = L.marker([lat, lon], { icon: myIcon })
      .addTo(map)
      .bindPopup(`<b style="color:#00ff88">📍 Você está aqui</b><br>
                  Lat: ${lat.toFixed(5)}<br>
                  Lon: ${lon.toFixed(5)}`);

    myCircle = L.circle([lat, lon], {
      radius: radius * 1000,
      color: '#00ff88',
      fillColor: '#00ff88',
      fillOpacity: 0.04,
      weight: 1,
      dashArray: '6 6',
    }).addTo(map);
  }

  // ── Plane SVG icon ────────────────────────────────────────────────────────
  function planeIcon(heading, highlighted) {
    const col = highlighted ? '#ffbb00' : '#00ccff';
    const glow = highlighted
      ? 'drop-shadow(0 0 6px #ffbb00)'
      : 'drop-shadow(0 0 4px #00aaff)';
    return L.divIcon({
      className: '',
      html: `<div style="transform:rotate(${heading}deg);filter:${glow};font-size:22px;line-height:1;color:${col};">✈</div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });
  }

  // ── Sidebar card ──────────────────────────────────────────────────────────
  function buildSidebar(planes) {
    const list = document.getElementById('plane-list');
    if (!planes.length) {
      list.innerHTML = '<div class="no-data">Nenhum voo detectado<br>no raio selecionado.</div>';
      return;
    }

    list.innerHTML = planes.map(p => {
      const alt  = p.alt_ft != null ? `${p.alt_ft.toLocaleString()} ft` : '—';
      const spd  = p.speed_kts != null ? `${p.speed_kts} kts` : '—';
      const hdg  = p.heading != null ? `${Math.round(p.heading)}°` : '—';
      return `
        <div class="plane-card ${p.icao === selectedIcao ? 'active' : ''}"
             onclick="selectPlane('${p.icao}')">
          <div class="plane-callsign">✈ ${p.callsign}</div>
          <div class="plane-info">
            <span title="ICAO">🔑 ${p.icao}</span>
            <span title="Altitude">↑ ${alt}</span>
            <span title="Velocidade">💨 ${spd}</span>
            <span title="Rumo">🧭 ${hdg}</span>
            <span title="País">🌍 ${p.country}</span>
          </div>
        </div>`;
    }).join('');
  }

  // ── Select / highlight plane ───────────────────────────────────────────────
  function selectPlane(icao) {
    selectedIcao = icao;
    // Re-render icons
    Object.entries(planeMarkers).forEach(([id, {marker, plane}]) => {
      marker.setIcon(planeIcon(plane.heading, id === icao));
    });
    // Update sidebar active
    document.querySelectorAll('.plane-card').forEach(c => {
      c.classList.toggle('active', c.getAttribute('onclick').includes(icao));
    });
    // Pan to plane & open popup
    const entry = planeMarkers[icao];
    if (entry) {
      map.panTo([entry.plane.lat, entry.plane.lon]);
      entry.marker.openPopup();
    }
  }

  // ── Render planes on map ──────────────────────────────────────────────────
  function renderPlanes(planes) {
    planeLayer.clearLayers();
    planeMarkers = {};

    planes.forEach(p => {
      const marker = L.marker([p.lat, p.lon], {
        icon: planeIcon(p.heading, p.icao === selectedIcao),
      }).addTo(planeLayer);

      const alt = p.alt_ft != null ? `${p.alt_ft.toLocaleString()} ft` : '—';
      const spd = p.speed_kts != null ? `${p.speed_kts} kts` : '—';

      marker.bindPopup(`
        <div>
          <b style="color:#00ff88;font-size:14px">✈ ${p.callsign}</b><br>
          <span style="color:#4a7090">ICAO:</span> ${p.icao}<br>
          <span style="color:#4a7090">País:</span> ${p.country}<br>
          <span style="color:#4a7090">Altitude:</span> ${alt}<br>
          <span style="color:#4a7090">Velocidade:</span> ${spd}<br>
          <span style="color:#4a7090">Rumo:</span> ${Math.round(p.heading || 0)}°<br>
          <span style="color:#4a7090">Squawk:</span> ${p.squawk}
        </div>
      `);

      marker.on('click', () => selectPlane(p.icao));
      planeMarkers[p.icao] = { marker, plane: p };
    });

    document.getElementById('count').textContent = planes.length;
    buildSidebar(planes);
  }

  // ── Fetch from backend ─────────────────────────────────────────────────────
  function setStatus(msg, type='') {
    const el = document.getElementById('status-msg');
    el.className = type;
    el.textContent = msg;
  }

  async function fetchAircraft() {
    if (myLat === null) return;
    const radius = document.getElementById('radius-select').value;
    document.getElementById('radius-display').textContent = radius;
    document.getElementById('refresh-btn').disabled = true;
    setStatus('⟳ Consultando OpenSky Network…');

    try {
      const r = await fetch(`/api/aircraft?lat=${myLat}&lon=${myLon}&radius=${radius}`);
      const data = await r.json();
      if (data.error) {
        setStatus(`⚠ ${data.error}`, 'err');
      } else {
        setStatus(`✔ ${data.count} aviões detectados — última atualização: ${new Date().toLocaleTimeString('pt-BR')}`, 'ok');
        renderPlanes(data.aircraft);
        placeMyMarker(myLat, myLon);
      }
    } catch(e) {
      setStatus('✘ Erro ao conectar ao servidor', 'err');
    } finally {
      document.getElementById('refresh-btn').disabled = false;
    }
  }

  // ── Countdown ticker ──────────────────────────────────────────────────────
  function startCountdown() {
    const interval = parseInt(document.getElementById('interval-select').value);
    countdownSec = interval;
    clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      countdownSec--;
      document.getElementById('refresh-countdown').textContent = countdownSec + 's';
      if (countdownSec <= 0) startAutoRefresh();
    }, 1000);
    document.getElementById('refresh-countdown').textContent = countdownSec + 's';
  }

  function startAutoRefresh() {
    clearInterval(refreshTimer);
    clearInterval(countdownTimer);
    fetchAircraft();
    startCountdown();
  }

  function manualRefresh() {
    clearInterval(refreshTimer);
    clearInterval(countdownTimer);
    fetchAircraft();
    startCountdown();
  }

  // ── Radius / interval change ───────────────────────────────────────────────
  document.getElementById('radius-select').addEventListener('change', manualRefresh);
  document.getElementById('interval-select').addEventListener('change', startCountdown);

  // ── Geolocation ───────────────────────────────────────────────────────────
  function onGeoSuccess(pos) {
    myLat = pos.coords.latitude;
    myLon = pos.coords.longitude;

    initMap(myLat, myLon);
    placeMyMarker(myLat, myLon);
    setStatus('📍 Localização obtida. Buscando voos…', 'ok');
    fetchAircraft();
    startCountdown();
  }

  function onGeoError(err) {
    // fallback: São Paulo
    myLat = -23.55;
    myLon = -46.63;
    initMap(myLat, myLon);
    placeMyMarker(myLat, myLon);
    setStatus(`⚠ Geolocalização indisponível (${err.message}). Usando São Paulo.`, 'err');
    fetchAircraft();
    startCountdown();
  }

  navigator.geolocation.getCurrentPosition(onGeoSuccess, onGeoError, {
    enableHighAccuracy: true,
    timeout: 10000,
  });
</script>
</body>
</html>
